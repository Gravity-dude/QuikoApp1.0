name: Build Quiko APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create folders
        run: |
          mkdir -p app/src/main/java/com/quiko/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

      - name: gradle-wrapper.properties
        run: |
          printf '%s\n' \
            'distributionBase=GRADLE_USER_HOME' \
            'distributionPath=wrapper/dists' \
            'distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip' \
            'zipStoreBase=GRADLE_USER_HOME' \
            'zipStorePath=wrapper/dists' \
            > gradle/wrapper/gradle-wrapper.properties

      - name: app/build.gradle
        run: |
          printf '%s\n' \
            "plugins { id 'com.android.application' }" \
            'android {' \
            "  namespace 'com.quiko.app'" \
            '  compileSdk 34' \
            '  defaultConfig {' \
            '    applicationId "com.quiko.app"' \
            '    minSdk 24' \
            '    targetSdk 34' \
            '    versionCode 1' \
            '    versionName "1.0"' \
            '  }' \
            '  buildTypes { release { minifyEnabled false } }' \
            '  compileOptions {' \
            '    sourceCompatibility JavaVersion.VERSION_1_8' \
            '    targetCompatibility JavaVersion.VERSION_1_8' \
            '  }' \
            '}' \
            'dependencies {' \
            "  implementation 'androidx.appcompat:appcompat:1.6.1'" \
            "  implementation 'com.google.android.material:material:1.11.0'" \
            "  implementation 'androidx.constraintlayout:constraintlayout:2.1.4'" \
            "  implementation 'androidx.recyclerview:recyclerview:1.3.2'" \
            "  implementation 'androidx.cardview:cardview:1.0.0'" \
            "  implementation 'androidx.core:core:1.12.0'" \
            '}' \
            > app/build.gradle

      - name: root build.gradle
        run: |
          printf '%s\n' \
            'buildscript {' \
            '  repositories { google(); mavenCentral() }' \
            "  dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }" \
            '}' \
            'allprojects { repositories { google(); mavenCentral() } }' \
            > build.gradle

      - name: settings.gradle
        run: |
          printf '%s\n' \
            'rootProject.name = "QuikoApp"' \
            "include ':app'" \
            > settings.gradle

      - name: local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: AndroidManifest.xml
        run: |
          python3 -c "
          content = '''<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">
              <uses-permission android:name=\"android.permission.RECORD_AUDIO\" />
              <uses-permission android:name=\"android.permission.CAMERA\" />
              <uses-permission android:name=\"android.permission.FLASHLIGHT\" />
              <uses-permission android:name=\"android.permission.VIBRATE\" />
              <uses-permission android:name=\"android.permission.RECEIVE_BOOT_COMPLETED\" />
              <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />
              <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />
              <uses-permission android:name=\"android.permission.WAKE_LOCK\" />
              <uses-feature android:name=\"android.hardware.camera.flash\" android:required=\"false\" />
              <uses-feature android:name=\"android.hardware.microphone\" android:required=\"true\" />
              <application
                  android:allowBackup=\"true\"
                  android:icon=\"@drawable/ic_quiko\"
                  android:label=\"@string/app_name\"
                  android:roundIcon=\"@drawable/ic_quiko\"
                  android:supportsRtl=\"true\"
                  android:theme=\"@style/Theme.QuikoApp\">
                  <activity
                      android:name=\".MainActivity\"
                      android:exported=\"true\"
                      android:launchMode=\"singleTop\"
                      android:screenOrientation=\"portrait\">
                      <intent-filter>
                          <action android:name=\"android.intent.action.MAIN\" />
                          <category android:name=\"android.intent.category.LAUNCHER\" />
                      </intent-filter>
                  </activity>
                  <service android:name=\".VoiceListenerService\" android:enabled=\"true\" android:exported=\"false\" />
                  <receiver android:name=\".AlarmReceiver\" android:enabled=\"true\" android:exported=\"false\">
                      <intent-filter><action android:name=\"com.quiko.app.ALARM_TRIGGER\" /></intent-filter>
                  </receiver>
                  <receiver android:name=\".ReminderReceiver\" android:enabled=\"true\" android:exported=\"false\">
                      <intent-filter><action android:name=\"com.quiko.app.REMINDER_TRIGGER\" /></intent-filter>
                  </receiver>
                  <receiver android:name=\".BootReceiver\" android:enabled=\"true\" android:exported=\"false\">
                      <intent-filter android:priority=\"1000\">
                          <action android:name=\"android.intent.action.BOOT_COMPLETED\" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>'''
          open('app/src/main/AndroidManifest.xml','w').write(content)
          "

      - name: Reminder.java
        run: |
          python3 -c "
          open('app/src/main/java/com/quiko/app/Reminder.java','w').write('''package com.quiko.app;
          public class Reminder {
              public long id; public String task; public long triggerTimeMs; public boolean done;
              public Reminder(long id,String task,long triggerTimeMs,boolean done){
                  this.id=id;this.task=task;this.triggerTimeMs=triggerTimeMs;this.done=done;
              }
          }''')
          "

      - name: SoundHelper.java
        run: |
          python3 -c "
          open('app/src/main/java/com/quiko/app/SoundHelper.java','w').write('''package com.quiko.app;
          import android.content.Context;
          import android.media.AudioManager;
          import android.media.ToneGenerator;
          public class SoundHelper {
              public static void playActivationBeep(Context context){
                  try{ ToneGenerator tg=new ToneGenerator(AudioManager.STREAM_NOTIFICATION,80);
                  tg.startTone(ToneGenerator.TONE_PROP_BEEP,150); }catch(Exception ignored){}
              }
          }''')
          "

      - name: BootReceiver.java
        run: |
          python3 -c "
          open('app/src/main/java/com/quiko/app/BootReceiver.java','w').write('''package com.quiko.app;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import androidx.core.content.ContextCompat;
          public class BootReceiver extends BroadcastReceiver {
              @Override public void onReceive(Context context,Intent intent){
                  if(Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())){
                      Intent s=new Intent(context,VoiceListenerService.class);
                      s.setAction(\"START\");
                      ContextCompat.startForegroundService(context,s);
                  }
              }
          }''')
          "

      - name: DatabaseHelper.java
        run: |
          python3 -c "
          open('app/src/main/java/com/quiko/app/DatabaseHelper.java','w').write('''package com.quiko.app;
          import android.content.ContentValues;
          import android.content.Context;
          import android.database.Cursor;
          import android.database.sqlite.SQLiteDatabase;
          import android.database.sqlite.SQLiteOpenHelper;
          import java.util.ArrayList;
          import java.util.List;
          public class DatabaseHelper extends SQLiteOpenHelper {
              private static final String DB_NAME=\"quiko.db\",TABLE=\"reminders\",COL_ID=\"id\",COL_TASK=\"task\",COL_TIME=\"trigger_time\",COL_DONE=\"done\";
              public DatabaseHelper(Context c){super(c,DB_NAME,null,1);}
              @Override public void onCreate(SQLiteDatabase db){
                  db.execSQL(\"CREATE TABLE \"+TABLE+\" (\"+COL_ID+\" INTEGER PRIMARY KEY AUTOINCREMENT,\"+COL_TASK+\" TEXT NOT NULL,\"+COL_TIME+\" INTEGER NOT NULL,\"+COL_DONE+\" INTEGER DEFAULT 0)\");
              }
              @Override public void onUpgrade(SQLiteDatabase db,int o,int n){db.execSQL(\"DROP TABLE IF EXISTS \"+TABLE);onCreate(db);}
              public long insertReminder(Reminder r){
                  ContentValues cv=new ContentValues();
                  cv.put(COL_TASK,r.task);cv.put(COL_TIME,r.triggerTimeMs);cv.put(COL_DONE,r.done?1:0);
                  return getWritableDatabase().insert(TABLE,null,cv);
              }
              public List<Reminder> getAllReminders(){
                  List<Reminder> list=new ArrayList<>();
                  Cursor c=getReadableDatabase().query(TABLE,null,null,null,null,null,COL_TIME+\" ASC\");
                  if(c.moveToFirst())do{list.add(new Reminder(c.getLong(0),c.getString(1),c.getLong(2),c.getInt(3)==1));}while(c.moveToNext());
                  c.close();return list;
              }
              public void markReminderDone(long id){ContentValues cv=new ContentValues();cv.put(COL_DONE,1);getWritableDatabase().update(TABLE,cv,COL_ID+\"=?\",new String[]{String.valueOf(id)});}
              public void deleteReminder(long id){getWritableDatabase().delete(TABLE,COL_ID+\"=?\",new String[]{String.valueOf(id)});}
              public void deleteAllReminders(){getWritableDatabase().delete(TABLE,null,null);}
          }''')
          "

      - name: AlarmReceiver.java
        run: |
          python3 -c "
          open('app/src/main/java/com/quiko/app/AlarmReceiver.java','w').write('''package com.quiko.app;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.media.RingtoneManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.VibrationEffect;
          import android.os.Vibrator;
          import androidx.core.app.NotificationCompat;
          public class AlarmReceiver extends BroadcastReceiver {
              private static final String CH=\"quiko_alarm\";
              @Override public void onReceive(Context ctx,Intent intent){
                  String label=intent.getStringExtra(\"label\"); if(label==null)label=\"Quiko Alarm\";
                  String time=intent.getStringExtra(\"time\"); if(time==null)time=\"Now\";
                  NotificationManager nm=(NotificationManager)ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                  if(Build.VERSION.SDK_INT>=Build.VERSION_CODES.O && nm!=null)
                      nm.createNotificationChannel(new NotificationChannel(CH,\"Quiko Alarms\",NotificationManager.IMPORTANCE_HIGH));
                  int f=Build.VERSION.SDK_INT>=Build.VERSION_CODES.M?PendingIntent.FLAG_IMMUTABLE:0;
                  PendingIntent pi=PendingIntent.getActivity(ctx,0,new Intent(ctx,MainActivity.class),f);
                  NotificationCompat.Builder b=new NotificationCompat.Builder(ctx,CH)
                      .setSmallIcon(android.R.drawable.ic_lock_idle_alarm)
                      .setContentTitle(\"Alarm: \"+label).setContentText(\"Set for \"+time)
                      .setPriority(NotificationCompat.PRIORITY_MAX).setAutoCancel(true).setContentIntent(pi);
                  if(nm!=null)nm.notify(2000,b.build());
                  try{Uri u=RingtoneManager.getDefaultUri(RingtoneManager.TYPE_ALARM);
                      android.media.Ringtone r=RingtoneManager.getRingtone(ctx,u);if(r!=null)r.play();}catch(Exception ignored){}
                  Vibrator v=(Vibrator)ctx.getSystemService(Context.VIBRATOR_SERVICE);
                  if(v!=null){long[]p={0,500,200,500,200,500};
                      if(Build.VERSION.SDK_INT>=Build.VERSION_CODES.O)v.vibrate(VibrationEffect.createWaveform(p,-1));
                      else v.vibrate(p,-1);}
              }
          }''')
          "

      - name: ReminderReceiver.java
        run: |
          python3 -c "
          open('app/src/main/java/com/quiko/app/ReminderReceiver.java','w').write('''package com.quiko.app;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.media.RingtoneManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.VibrationEffect;
          import android.os.Vibrator;
          import androidx.core.app.NotificationCompat;
          public class ReminderReceiver extends BroadcastReceiver {
              private static final String CH=\"quiko_reminders\";
              @Override public void onReceive(Context ctx,Intent intent){
                  String task=intent.getStringExtra(\"task\"); if(task==null)task=\"Reminder\";
                  int rid=intent.getIntExtra(\"id\",-1);
                  if(rid!=-1)new DatabaseHelper(ctx).markReminderDone(rid);
                  NotificationManager nm=(NotificationManager)ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                  if(Build.VERSION.SDK_INT>=Build.VERSION_CODES.O && nm!=null)
                      nm.createNotificationChannel(new NotificationChannel(CH,\"Quiko Reminders\",NotificationManager.IMPORTANCE_HIGH));
                  int f=Build.VERSION.SDK_INT>=Build.VERSION_CODES.M?PendingIntent.FLAG_IMMUTABLE:0;
                  PendingIntent pi=PendingIntent.getActivity(ctx,rid,new Intent(ctx,MainActivity.class),f);
                  Uri sound=RingtoneManager.getDefaultUri(RingtoneManager.TYPE_NOTIFICATION);
                  NotificationCompat.Builder b=new NotificationCompat.Builder(ctx,CH)
                      .setSmallIcon(android.R.drawable.ic_popup_reminder)
                      .setContentTitle(\"Quiko Reminder\").setContentText(task)
                      .setPriority(NotificationCompat.PRIORITY_HIGH).setSound(sound).setAutoCancel(true).setContentIntent(pi);
                  if(nm!=null)nm.notify(3000+rid,b.build());
                  Vibrator v=(Vibrator)ctx.getSystemService(Context.VIBRATOR_SERVICE);
                  if(v!=null){if(Build.VERSION.SDK_INT>=Build.VERSION_CODES.O)v.vibrate(VibrationEffect.createOneShot(400,VibrationEffect.DEFAULT_AMPLITUDE));else v.vibrate(400);}
              }
          }''')
          "

      - name: ReminderAdapter.java
        run: |
          python3 -c "
          open('app/src/main/java/com/quiko/app/ReminderAdapter.java','w').write('''package com.quiko.app;
          import android.graphics.Paint;
          import android.view.LayoutInflater;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ImageButton;
          import android.widget.TextView;
          import androidx.annotation.NonNull;
          import androidx.recyclerview.widget.RecyclerView;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.List;
          import java.util.Locale;
          public class ReminderAdapter extends RecyclerView.Adapter<ReminderAdapter.VH> {
              interface OnDeleteListener{void onDelete(Reminder r);}
              private List<Reminder> items;
              private final OnDeleteListener dl;
              private final SimpleDateFormat sdf=new SimpleDateFormat(\"MMM d, h:mm a\",Locale.US);
              public ReminderAdapter(List<Reminder> items,OnDeleteListener l){this.items=items;this.dl=l;}
              public void updateData(List<Reminder> n){this.items=n;notifyDataSetChanged();}
              @NonNull @Override
              public VH onCreateViewHolder(@NonNull ViewGroup p,int t){
                  return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_reminder,p,false));
              }
              @Override public void onBindViewHolder(@NonNull VH h,int i){
                  Reminder r=items.get(i);
                  h.tvTask.setText(r.task);h.tvTime.setText(sdf.format(new Date(r.triggerTimeMs)));
                  if(r.done){h.tvTask.setPaintFlags(h.tvTask.getPaintFlags()|Paint.STRIKE_THRU_TEXT_FLAG);h.tvTask.setAlpha(0.5f);}
                  else{h.tvTask.setPaintFlags(h.tvTask.getPaintFlags()&~Paint.STRIKE_THRU_TEXT_FLAG);h.tvTask.setAlpha(1f);}
                  h.btnDelete.setOnClickListener(v->dl.onDelete(r));
              }
              @Override public int getItemCount(){return items.size();}
              static class VH extends RecyclerView.ViewHolder{
                  TextView tvTask,tvTime;ImageButton btnDelete;
                  VH(@NonNull View v){super(v);tvTask=v.findViewById(R.id.tvTask);tvTime=v.findViewById(R.id.tvTime);btnDelete=v.findViewById(R.id.btnDelete);}
              }
          }''')
          "

      - name: CommandProcessor.java
        run: |
          python3 << 'PYEOF'
          code = r'''package com.quiko.app;
          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import android.hardware.camera2.CameraAccessException;
          import android.hardware.camera2.CameraManager;
          import android.os.Build;
          import android.speech.tts.TextToSpeech;
          import android.util.Log;
          import java.util.Calendar;
          import java.util.HashMap;
          import java.util.Locale;
          import java.util.Map;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;
          public class CommandProcessor {
              private static final String TAG = "CommandProcessor";
              private final Context context;
              private final AlarmManager alarmManager;
              private final DatabaseHelper dbHelper;
              private TextToSpeech tts;
              private String torchCameraId;
              private static final Map<String, Integer> NW = new HashMap<>();
              static {
                  String[] ones = {"zero","one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen"};
                  String[] tens = {"","","twenty","thirty","forty","fifty"};
                  for (int i = 0; i < ones.length; i++) NW.put(ones[i], i);
                  for (int i = 2; i < tens.length; i++) NW.put(tens[i], i * 10);
              }
              public CommandProcessor(Context context) {
                  this.context = context.getApplicationContext();
                  this.alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  this.dbHelper = new DatabaseHelper(context);
                  tts = new TextToSpeech(context, status -> { if (status == TextToSpeech.SUCCESS) tts.setLanguage(Locale.US); });
                  try {
                      CameraManager cm = (CameraManager) context.getSystemService(Context.CAMERA_SERVICE);
                      for (String id : cm.getCameraIdList()) {
                          if (cm.getCameraCharacteristics(id).get(android.hardware.camera2.CameraCharacteristics.FLASH_INFO_AVAILABLE) == Boolean.TRUE) { torchCameraId = id; break; }
                      }
                  } catch (CameraAccessException e) { Log.e(TAG, "cam", e); }
              }
              public String process(String cmd) {
                  cmd = cmd.trim().toLowerCase();
                  if (cmd.isEmpty()) return "I didn't catch that.";
                  if (cmd.contains("alarm") && cmd.contains("cancel")) return cancelAlarm();
                  if (cmd.contains("alarm") || cmd.contains("set alarm")) return setAlarm(cmd);
                  if (cmd.contains("flash") || cmd.contains("torch") || cmd.contains("light")) return toggleFlashlight(!cmd.contains("off"));
                  if (cmd.contains("remind") || cmd.contains("reminder")) return setReminder(cmd);
                  if (cmd.contains("time")) return tellTime();
                  if (cmd.contains("help")) return help();
                  return "Not recognised. Try: set alarm, flashlight on, remind me, or help.";
              }
              private String setAlarm(String cmd) {
                  Calendar cal = parseTime(cmd);
                  if (cal == null) { speak("Sorry, I could not understand the time."); return "Could not parse time."; }
                  if (cal.getTimeInMillis() <= System.currentTimeMillis()) cal.add(Calendar.DAY_OF_YEAR, 1);
                  Intent i = new Intent(context, AlarmReceiver.class);
                  i.setAction("com.quiko.app.ALARM_TRIGGER");
                  i.putExtra("label", "Quiko Alarm"); i.putExtra("time", formatTime(cal));
                  int f = Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE : PendingIntent.FLAG_UPDATE_CURRENT;
                  alarmManager.set(AlarmManager.RTC_WAKEUP, cal.getTimeInMillis(), PendingIntent.getBroadcast(context, (int) cal.getTimeInMillis(), i, f));
                  String t = formatTime(cal); speak("Alarm set for " + t); return "Alarm set for " + t;
              }
              private String cancelAlarm() {
                  int f = Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_NO_CREATE | PendingIntent.FLAG_IMMUTABLE : PendingIntent.FLAG_NO_CREATE;
                  PendingIntent pi = PendingIntent.getBroadcast(context, 0, new Intent(context, AlarmReceiver.class), f);
                  if (pi != null) { alarmManager.cancel(pi); pi.cancel(); speak("Alarm cancelled"); return "Alarm cancelled"; }
                  speak("No alarm found"); return "No active alarm found";
              }
              private String toggleFlashlight(boolean on) {
                  if (torchCameraId == null) return "No flashlight found";
                  try {
                      ((CameraManager) context.getSystemService(Context.CAMERA_SERVICE)).setTorchMode(torchCameraId, on);
                      String msg = on ? "Flashlight on" : "Flashlight off"; speak(msg); return msg;
                  } catch (CameraAccessException e) { return "Flashlight error: " + e.getMessage(); }
              }
              private String setReminder(String cmd) {
                  String task = cmd.replaceAll("(?i)hey quiko","").replaceAll("(?i)remind me to","").replaceAll("(?i)remind me","").replaceAll("(?i)set a reminder","").replaceAll("(?i)reminder","").trim();
                  Calendar cal = parseTime(cmd);
                  long triggerAt; String td;
                  if (cal != null) {
                      if (cal.getTimeInMillis() <= System.currentTimeMillis()) cal.add(Calendar.DAY_OF_YEAR, 1);
                      triggerAt = cal.getTimeInMillis(); td = formatTime(cal);
                      task = task.replaceAll("(?i)(at|in)\\s+\\d+.*", "").trim();
                  } else {
                      cal = Calendar.getInstance(); cal.add(Calendar.HOUR_OF_DAY, 1);
                      triggerAt = cal.getTimeInMillis(); td = formatTime(cal) + " (1h from now)";
                  }
                  if (task.isEmpty()) task = "Reminder";
                  long id = dbHelper.insertReminder(new Reminder(0, task, triggerAt, false));
                  Intent ri = new Intent(context, ReminderReceiver.class);
                  ri.setAction("com.quiko.app.REMINDER_TRIGGER"); ri.putExtra("task", task); ri.putExtra("id", (int) id);
                  int f = Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE : PendingIntent.FLAG_UPDATE_CURRENT;
                  alarmManager.set(AlarmManager.RTC_WAKEUP, triggerAt, PendingIntent.getBroadcast(context, (int) id, ri, f));
                  speak("Reminder set: " + task + " at " + td); return "Reminder: " + task + " at " + td;
              }
              private String tellTime() {
                  Calendar n = Calendar.getInstance();
                  String t = String.format(Locale.US, "%d:%02d %s", n.get(Calendar.HOUR) == 0 ? 12 : n.get(Calendar.HOUR), n.get(Calendar.MINUTE), n.get(Calendar.AM_PM) == Calendar.AM ? "AM" : "PM");
                  speak("It is " + t); return "Current time: " + t;
              }
              private String help() {
                  String m = "Say: set alarm at 7 AM, alarm in 30 minutes, flashlight on or off, remind me to take medicine at 8 PM, what time is it, or cancel alarm.";
                  speak(m); return m;
              }
              private Calendar parseTime(String text) {
                  text = text.toLowerCase(Locale.US);
                  Matcher m = Pattern.compile("in\\s+(\\w+)\\s+(minute|minutes|min|hour|hours|hr)").matcher(text);
                  if (m.find()) { int a = parseNum(m.group(1)); if (a > 0) { Calendar c = Calendar.getInstance(); if (m.group(2).startsWith("h")) c.add(Calendar.HOUR_OF_DAY, a); else c.add(Calendar.MINUTE, a); c.set(Calendar.SECOND, 0); return c; } }
                  m = Pattern.compile("(?:at\\s+)?(\\d{1,2})(?::(\\d{2}))?\\s*(am|pm)").matcher(text);
                  if (m.find()) { int h = Integer.parseInt(m.group(1)), min = m.group(2) != null ? Integer.parseInt(m.group(2)) : 0; boolean pm = m.group(3).startsWith("p"); if (pm && h != 12) h += 12; if (!pm && h == 12) h = 0; Calendar c = Calendar.getInstance(); c.set(Calendar.HOUR_OF_DAY, h); c.set(Calendar.MINUTE, min); c.set(Calendar.SECOND, 0); c.set(Calendar.MILLISECOND, 0); return c; }
                  m = Pattern.compile("(?:at\\s+)?(\\d{1,2}):(\\d{2})").matcher(text);
                  if (m.find()) { int h = Integer.parseInt(m.group(1)), min = Integer.parseInt(m.group(2)); if (h <= 23 && min <= 59) { Calendar c = Calendar.getInstance(); c.set(Calendar.HOUR_OF_DAY, h); c.set(Calendar.MINUTE, min); c.set(Calendar.SECOND, 0); c.set(Calendar.MILLISECOND, 0); return c; } }
                  return null;
              }
              private int parseNum(String w) { try { return Integer.parseInt(w); } catch (NumberFormatException e) { Integer v = NW.get(w.toLowerCase()); return v != null ? v : -1; } }
              private String formatTime(Calendar c) { int h = c.get(Calendar.HOUR); if (h == 0) h = 12; return String.format(Locale.US, "%d:%02d %s", h, c.get(Calendar.MINUTE), c.get(Calendar.AM_PM) == Calendar.AM ? "AM" : "PM"); }
              private void speak(String t) { if (tts != null) tts.speak(t, TextToSpeech.QUEUE_FLUSH, null, "q"); }
          }'''
          open('app/src/main/java/com/quiko/app/CommandProcessor.java','w').write(code)
          PYEOF

      - name: VoiceListenerService.java
        run: |
          python3 << 'PYEOF'
          code = r'''package com.quiko.app;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import androidx.core.app.NotificationCompat;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.Locale;
          public class VoiceListenerService extends Service {
              private static final String CHANNEL_ID = "quiko_channel";
              private static final int NOTIF_ID = 1;
              private static final String[] WAKE_WORDS = {"hey quiko","hey quicko","hey quick o","quiko","hey kiko"};
              private enum State { WAKE_LISTENING, COMMAND_LISTENING }
              private State currentState = State.WAKE_LISTENING;
              private SpeechRecognizer sr;
              private final Handler handler = new Handler(Looper.getMainLooper());
              private CommandProcessor cp;
              private boolean running = false;
              public interface StatusCallback { void onUpdate(String status, String lastCommand); }
              private static StatusCallback cb;
              public static void setStatusCallback(StatusCallback c) { cb = c; }
              @Override public void onCreate() { super.onCreate(); cp = new CommandProcessor(this); createNotificationChannel(); }
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null && "STOP".equals(intent.getAction())) { stopAll(); stopForeground(true); stopSelf(); return START_NOT_STICKY; }
                  startForeground(NOTIF_ID, buildNotif("Listening for Hey Quiko..."));
                  running = true; initSR(); startWake();
                  return START_STICKY;
              }
              @Override public IBinder onBind(Intent i) { return null; }
              private void initSR() {
                  if (sr != null) sr.destroy();
                  sr = SpeechRecognizer.createSpeechRecognizer(this);
                  sr.setRecognitionListener(new RL());
              }
              private Intent recogIntent() {
                  Intent i = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.getDefault());
                  i.putExtra(RecognizerIntent.EXTRA_PREFER_OFFLINE, true);
                  i.putExtra(RecognizerIntent.EXTRA_MAX_RESULTS, 5);
                  return i;
              }
              private void startWake() {
                  if (!running) return;
                  currentState = State.WAKE_LISTENING;
                  updateNotif("Listening for Hey Quiko...");
                  if (cb != null) cb.onUpdate("Listening for Hey Quiko...", null);
                  handler.postDelayed(() -> { if (running && sr != null) sr.startListening(recogIntent()); }, 300);
              }
              private void startCmd() {
                  if (!running) return;
                  currentState = State.COMMAND_LISTENING;
                  if (cb != null) cb.onUpdate("Hey Quiko! Speak your command...", null);
                  SoundHelper.playActivationBeep(this);
                  initSR();
                  handler.postDelayed(() -> { if (running && sr != null) sr.startListening(recogIntent()); }, 600);
              }
              private void stopAll() {
                  running = false;
                  if (sr != null) { sr.stopListening(); sr.cancel(); sr.destroy(); sr = null; }
              }
              private boolean isWake(String t) { for (String w : WAKE_WORDS) if (t.contains(w)) return true; return false; }
              private void doCmd(String cmd, List<String> all) {
                  for (String w : WAKE_WORDS) cmd = cmd.replace(w, "").trim();
                  if (cmd.isEmpty() && all.size() > 1) cmd = all.get(1).toLowerCase().trim();
                  String fb = cp.process(cmd);
                  if (cb != null) cb.onUpdate(cmd + " -> " + fb, cmd);
                  handler.postDelayed(this::startWake, 1500);
              }
              private class RL implements RecognitionListener {
                  @Override public void onReadyForSpeech(Bundle p) {}
                  @Override public void onBeginningOfSpeech() {}
                  @Override public void onRmsChanged(float r) {}
                  @Override public void onBufferReceived(byte[] b) {}
                  @Override public void onEndOfSpeech() {}
                  @Override public void onEvent(int e, Bundle p) {}
                  @Override public void onPartialResults(Bundle pb) {
                      if (currentState == State.WAKE_LISTENING) {
                          ArrayList<String> p = pb.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          if (p != null) for (String t : p) if (isWake(t.toLowerCase())) { sr.cancel(); startCmd(); return; }
                      }
                  }
                  @Override public void onResults(Bundle res) {
                      ArrayList<String> m = res.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                      if (m == null || m.isEmpty()) { handler.postDelayed(() -> { if (running) { initSR(); startWake(); } }, 400); return; }
                      String top = m.get(0).toLowerCase().trim();
                      if (currentState == State.WAKE_LISTENING) {
                          if (isWake(top)) startCmd();
                          else handler.postDelayed(() -> { if (running) { initSR(); startWake(); } }, 400);
                      } else doCmd(top, m);
                  }
                  @Override public void onError(int e) { handler.postDelayed(() -> { if (running) { initSR(); startWake(); } }, 1000); }
              }
              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel ch = new NotificationChannel(CHANNEL_ID, "Quiko Voice Assistant", NotificationManager.IMPORTANCE_LOW);
                      NotificationManager nm = getSystemService(NotificationManager.class);
                      if (nm != null) nm.createNotificationChannel(ch);
                  }
              }
              private Notification buildNotif(String text) {
                  int f = Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0;
                  PendingIntent pi = PendingIntent.getActivity(this, 0, new Intent(this, MainActivity.class), f);
                  return new NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("Quiko Assistant").setContentText(text)
                      .setSmallIcon(android.R.drawable.ic_btn_speak_now)
                      .setContentIntent(pi).setOngoing(true).setPriority(NotificationCompat.PRIORITY_LOW).build();
              }
              private void updateNotif(String text) {
                  NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                  if (nm != null) nm.notify(NOTIF_ID, buildNotif(text));
              }
              @Override public void onDestroy() { stopAll(); super.onDestroy(); }
          }'''
