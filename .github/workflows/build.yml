      - name: MainActivity.java
        run: |
          python3 << 'PYEOF'
          code = r'''package com.quiko.app;
          import android.Manifest;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import androidx.recyclerview.widget.RecyclerView;
          import com.google.android.material.floatingactionbutton.FloatingActionButton;
          import com.google.android.material.switchmaterial.SwitchMaterial;
          import java.util.List;
          public class MainActivity extends AppCompatActivity {
              private static final int PERM_CODE = 101;
              private TextView tvStatus, tvLastCommand;
              private SwitchMaterial switchListening;
              private ReminderAdapter reminderAdapter;
              private DatabaseHelper dbHelper;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  dbHelper = new DatabaseHelper(this);
                  tvStatus = findViewById(R.id.tvStatus);
                  tvLastCommand = findViewById(R.id.tvLastCommand);
                  switchListening = findViewById(R.id.switchListening);
                  RecyclerView rv = findViewById(R.id.rvReminders);
                  rv.setLayoutManager(new LinearLayoutManager(this));
                  switchListening.setOnCheckedChangeListener((btn, on) -> { if (on) startVoice(); else stopVoice(); });
                  FloatingActionButton fab = findViewById(R.id.fabClear);
                  fab.setOnClickListener(v -> { dbHelper.deleteAllReminders(); loadReminders(); Toast.makeText(this,"Reminders cleared",Toast.LENGTH_SHORT).show(); });
                  setCallback();
                  loadReminders();
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) == PackageManager.PERMISSION_GRANTED) {
                      switchListening.setChecked(true);
                  } else {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.RECORD_AUDIO}, PERM_CODE);
                  }
              }
              private void setCallback() {
                  VoiceListenerService.setStatusCallback((status, lastCmd) -> runOnUiThread(() -> {
                      if (status != null) tvStatus.setText(status);
                      if (lastCmd != null) { tvLastCommand.setText("Last: " + lastCmd); loadReminders(); }
                  }));
              }
              private void startVoice() {
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) { switchListening.setChecked(false); return; }
                  Intent s = new Intent(this, VoiceListenerService.class); s.setAction("START");
                  ContextCompat.startForegroundService(this, s);
                  tvStatus.setText("Listening for Hey Quiko...");
              }
              private void stopVoice() {
                  Intent s = new Intent(this, VoiceListenerService.class); s.setAction("STOP");
                  startService(s); tvStatus.setText("Paused - toggle to resume");
              }
              private void loadReminders() {
                  List<Reminder> list = dbHelper.getAllReminders();
                  RecyclerView rv = findViewById(R.id.rvReminders);
                  if (reminderAdapter == null) {
                      reminderAdapter = new ReminderAdapter(list, r -> { dbHelper.deleteReminder(r.id); loadReminders(); });
                      rv.setAdapter(reminderAdapter);
                  } else reminderAdapter.updateData(list);
              }
              @Override
              public void onRequestPermissionsResult(int code, @NonNull String[] perms, @NonNull int[] results) {
                  super.onRequestPermissionsResult(code, perms, results);
                  if (code == PERM_CODE) {
                      if (results.length > 0 && results[0] == PackageManager.PERMISSION_GRANTED) switchListening.setChecked(true);
                      else Toast.makeText(this, "Microphone permission is required!", Toast.LENGTH_LONG).show();
                  }
              }
              @Override protected void onResume() { super.onResume(); loadReminders(); setCallback(); }
              @Override protected void onDestroy() { super.onDestroy(); VoiceListenerService.setStatusCallback(null); }
          }'''
