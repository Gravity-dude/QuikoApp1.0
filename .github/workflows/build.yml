name: Build Quiko APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show ALL files
        run: find . -not -path './.git/*' | sort

      - name: Show app build.gradle
        run: cat app/build.gradle

      - name: Show root build.gradle
        run: cat build.gradle

      - name: Show settings.gradle
        run: cat settings.gradle
